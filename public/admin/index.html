<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台数据管理</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <header class="admin-header">
    <div>
      <h1>数据管理后台</h1>
      <p id="currentAdminText"></p>
    </div>
    <div class="header-actions">
      <a id="userManageLink" href="/admin/users" hidden>账号管理</a>
      <button id="changeOwnPasswordButton" type="button">修改密码</button>
      <button id="logoutButton" type="button">退出登录</button>
    </div>
  </header>

  <section class="action-bar">
    <div class="action-bar-left">
      <button id="toggleFiltersButton" type="button" class="btn-cancel">
        <span id="filterToggleIcon">▼</span> 高级筛选
      </button>
    </div>
    <div class="action-bar-right">
      <button id="batchImportButton" type="button" class="btn-primary">批量导入</button>
      <button id="createRecordButton" type="button" class="btn-primary">新增记录</button>
      <button id="batchDeleteButton" type="button" class="btn-cancel" disabled>批量删除</button>
      <button id="exportCsvButton" type="button" class="btn-cancel">导出 CSV</button>
    </div>
  </section>

  <section class="filter-section hidden" id="filterSection">
    <div class="filter-grid">
      <div class="filter-item"><label>谷歌号</label><input id="filterGoogleAccount" placeholder="模糊搜索" /></div>
      <div class="filter-item"><label>谷歌密码</label><input id="filterGooglePassword" placeholder="精确搜索" /></div>
      <div class="filter-item"><label>谷歌辅助</label><input id="filterGoogleAssist" placeholder="模糊搜索" /></div>
      <div class="filter-item"><label>谷歌到期(起)</label><input id="filterGoogleExpireFrom" type="datetime-local" /></div>
      <div class="filter-item"><label>谷歌到期(止)</label><input id="filterGoogleExpireTo" type="datetime-local" /></div>
      <div class="filter-item"><label>UID</label><input id="filterUidValue" placeholder="模糊搜索" /></div>
      <div class="filter-item"><label>UID创建(起)</label><input id="filterUidCreatedFrom" type="datetime-local" /></div>
      <div class="filter-item"><label>UID创建(止)</label><input id="filterUidCreatedTo" type="datetime-local" /></div>
      <div class="filter-item"><label>OP</label><input id="filterOpValue" placeholder="模糊搜索" /></div>
      <div class="filter-item"><label>OP链接</label><input id="filterOpLink" placeholder="模糊搜索" /></div>
      <div class="filter-item"><label>OP到期(起)</label><input id="filterOpExpireFrom" type="datetime-local" /></div>
      <div class="filter-item"><label>OP到期(止)</label><input id="filterOpExpireTo" type="datetime-local" /></div>
      <div class="filter-item"><label>备注</label><input id="filterRemark" placeholder="模糊搜索" /></div>
    </div>
    <div class="filter-actions">
      <button id="resetFiltersButton" type="button" class="btn-cancel">重置</button>
      <button id="applyFiltersButton" type="button" class="btn-primary">应用筛选</button>
    </div>
  </section>

  <div class="table-wrap">
    <table id="recordTable">
      <thead>
        <tr>
          <th><input id="selectAllRecordsCheckbox" type="checkbox" aria-label="全选当前页" /></th>
          <th>谷歌号</th>
          <th>谷歌密码</th>
          <th>谷歌辅助</th>
          <th>谷歌到期时间</th>
          <th>UID</th>
          <th>UID创建时间</th>
          <th>OP</th>
          <th>OP链接</th>
          <th>OP到期时间</th>
          <th>备注</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="recordTableBody"></tbody>
    </table>
  </div>

  <div class="pagination-bar">
    <button id="previousPageButton" type="button">上一页</button>
    <span id="pageStatus"></span>
    <button id="nextPageButton" type="button">下一页</button>
  </div>

  <dialog id="recordDialog">
    <form id="recordForm" method="dialog" class="stack-form">
      <input id="recordId" type="hidden" />
      <label for="recordGoogleAccount">谷歌号</label>
      <input id="recordGoogleAccount" placeholder="谷歌号" required />
      <label for="recordGooglePassword">谷歌密码</label>
      <input id="recordGooglePassword" placeholder="谷歌密码" required />
      <label for="recordGoogleAssist">谷歌辅助</label>
      <input id="recordGoogleAssist" placeholder="谷歌辅助" required />
      <label for="recordGoogleExpireAt">谷歌到期时间</label>
      <input id="recordGoogleExpireAt" type="datetime-local" />
      <label for="recordUidValue">UID</label>
      <input id="recordUidValue" placeholder="UID（可留空，后续首次填写时自动记录时间）" />
      <label for="recordUidCreatedAt">UID创建时间</label>
      <input id="recordUidCreatedAt" placeholder="UID创建时间" disabled />
      <label for="recordOpValue">OP</label>
      <input id="recordOpValue" placeholder="OP" required />
      <label for="recordOpLink">OP链接</label>
      <input id="recordOpLink" placeholder="OP链接（会根据 OP 自动生成）" />
      <label for="recordOpExpireAt">OP到期时间</label>
      <input id="recordOpExpireAt" type="datetime-local" />
      <label for="recordRemark">备注</label>
      <textarea id="recordRemark" placeholder="备注"></textarea>
      <menu>
        <button type="button" id="recordCancelButton">取消</button>
        <button type="submit">保存</button>
      </menu>
    </form>
  </dialog>

  <dialog id="batchImportDialog">
    <form id="batchImportForm" method="dialog" class="stack-form">
      <h3>批量导入</h3>
      <div class="import-help">
        <p>系统会自动识别每行数据格式，支持以下三种导入模式：</p>
        <ul>
          <li><b>导入谷歌号：</b> <code>谷歌号----谷歌密码----谷歌辅助</code><br/>(默认到期时间 +7天，如果库中有未绑定谷歌号的 OP，将自动互补绑定)</li>
          <li><b>导入 OP：</b> <code>OP数据</code><br/>(以 | 分隔的字符串，自动生成链接和到期时间 +30天。如果库中有未绑定 OP 的谷歌号，将自动互补绑定)</li>
          <li><b>综合导入：</b> <code>谷歌号----密码----辅助----OP数据</code><br/>(完整导入一条记录)</li>
        </ul>
      </div>
      <textarea
        id="batchImportText"
        placeholder="示例一 (谷歌号): ezbprtcqxcgpn@goosttle.top----xowyiihpoe1fx----ehi3dzlerlyki@outlook.com&#10;示例二 (OP数据): AD9E11313002BC4FC8C01217A304D6A9|BA8E369FEE524F5D6A4DCD3496590019|242A2540CED09DD813D0D01CCE0A6593|f131d4565ab3470029209feab7437bc8|1781212159&#10;示例三 (综合): ezbprtcqxcgpn@goosttle.top----xowyiihpoe1fx----ehi3dzlerlyki@outlook.com----AD9E11313002BC4FC8C01217A304D6A9|BA8E369FEE524F5D6A4DCD3496590019|242A2540CED09DD813D0D01CCE0A6593|f131d4565ab3470029209feab7437bc8|1781212159"
        required
      ></textarea>
      <menu>
        <button type="button" id="batchImportCancelButton" class="btn-cancel">取消</button>
        <button type="submit" class="btn-primary">开始导入</button>
      </menu>
    </form>
  </dialog>

  <dialog id="selfPasswordDialog">
    <form id="selfPasswordForm" method="dialog" class="stack-form">
      <label for="selfCurrentPassword">当前密码</label>
      <input id="selfCurrentPassword" type="password" placeholder="当前密码" required />
      <label for="selfNewPassword">新密码</label>
      <input id="selfNewPassword" type="password" placeholder="新密码" required />
      <label for="selfConfirmPassword">确认新密码</label>
      <input id="selfConfirmPassword" type="password" placeholder="再次输入新密码" required />
      <menu>
        <button type="button" id="selfPasswordCancelButton">取消</button>
        <button type="submit">保存新密码</button>
      </menu>
    </form>
  </dialog>

  <script src="/admin/common.js"></script>
  <script src="/admin/records.js"></script>
</body>
</html>
