<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>账号管理</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <header class="admin-header">
    <div>
      <h1>账号管理</h1>
      <p>仅超级管理员可用</p>
    </div>
    <div class="header-actions">
      <a href="/admin">返回数据管理</a>
      <button id="changeOwnPasswordButton" type="button">修改密码</button>
      <button id="logoutButton" type="button">退出登录</button>
    </div>
  </header>

  <section class="header-actions admin-section">
    <button id="createUserButton" type="button">新增运营账号</button>
  </section>

  <div class="table-wrap">
    <table id="userTable">
      <thead>
        <tr>
          <th>登录名</th>
          <th>邮箱</th>
          <th>角色</th>
          <th>状态</th>
          <th>最后登录</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>
  </div>

  <dialog id="userDialog">
    <form id="userForm" method="dialog" class="stack-form">
      <div class="dialog-heading">
        <h3>账号信息</h3>
        <p class="dialog-subtitle">创建或维护运营账号的登录信息、角色与状态。</p>
      </div>
      <input id="userId" type="hidden" />
      <label for="userLogin">登录名</label>
      <input id="userLogin" placeholder="登录名" required />
      <label for="userEmail">邮箱</label>
      <input id="userEmail" placeholder="邮箱" required />
      <label for="userRole">角色</label>
      <select id="userRole">
        <option value="operator">运营</option>
        <option value="super_admin">超级管理员</option>
      </select>
      <label for="userStatus">状态</label>
      <select id="userStatus">
        <option value="active">启用</option>
        <option value="disabled">禁用</option>
      </select>
      <label for="userPassword">密码</label>
      <input id="userPassword" type="password" placeholder="创建时输入密码" />
      <menu class="dialog-menu">
        <button type="button" id="userCancelButton">取消</button>
        <button type="submit">保存</button>
      </menu>
    </form>
  </dialog>

  <dialog id="passwordDialog">
    <form id="passwordForm" method="dialog" class="stack-form">
      <div class="dialog-heading">
        <h3>重置密码</h3>
        <p class="dialog-subtitle">为该账号设置一个新的登录密码。</p>
      </div>
      <input id="passwordTargetUserId" type="hidden" />
      <label for="newPassword">新密码</label>
      <input id="newPassword" type="password" placeholder="新密码" required />
      <menu class="dialog-menu">
        <button type="button" id="passwordCancelButton">取消</button>
        <button type="submit">重置密码</button>
      </menu>
    </form>
  </dialog>

  <dialog id="qrConfigDialog">
    <form id="qrConfigForm" method="dialog" class="stack-form">
      <div class="dialog-heading">
        <h3>二维码配置</h3>
        <p class="dialog-subtitle">配置该用户在数据中心右侧展示的 Wi‑Fi 二维码。</p>
      </div>
      <input id="qrConfigTargetUserId" type="hidden" />
      <label for="wifiType">加密方式</label>
      <select id="wifiType">
        <option value="WPA">WPA</option>
        <option value="WEP">WEP</option>
        <option value="NOPASS">无密码</option>
      </select>
      <label for="wifiSsid">Wi‑Fi 名称</label>
      <input id="wifiSsid" placeholder="例如 888800000" />
      <label for="wifiPassword">Wi‑Fi 密码</label>
      <input id="wifiPassword" placeholder="例如 qq123456" />
      <label class="checkbox-inline" for="wifiHidden">
        <input id="wifiHidden" type="checkbox" />
        <span>隐藏网络</span>
      </label>
      <div class="wifi-preview-card">
        <div class="wifi-preview-title">实时预览</div>
        <img id="wifiQrPreviewImage" class="wifi-preview-image" alt="Wi-Fi 二维码预览" />
        <div id="wifiQrPreviewText" class="wifi-preview-text">填写 Wi‑Fi 名称后，这里会实时生成二维码</div>
      </div>
      <menu class="dialog-menu">
        <button type="button" id="qrConfigCancelButton">取消</button>
        <button type="submit">保存二维码配置</button>
      </menu>
    </form>
  </dialog>

  <dialog id="selfPasswordDialog">
    <form id="selfPasswordForm" method="dialog" class="stack-form">
      <div class="dialog-heading">
        <h3>修改密码</h3>
        <p class="dialog-subtitle">请输入当前密码，并设置一个新的登录密码。</p>
      </div>
      <label for="selfCurrentPassword">当前密码</label>
      <input id="selfCurrentPassword" type="password" placeholder="当前密码" required />
      <label for="selfNewPassword">新密码</label>
      <input id="selfNewPassword" type="password" placeholder="新密码" required />
      <label for="selfConfirmPassword">确认新密码</label>
      <input id="selfConfirmPassword" type="password" placeholder="再次输入新密码" required />
      <menu class="dialog-menu">
        <button type="button" id="selfPasswordCancelButton">取消</button>
        <button type="submit">保存新密码</button>
      </menu>
    </form>
  </dialog>

  <script src="/user-center-qr.js"></script>
  <script src="/admin/common.js"></script>
  <script src="/admin/users.js"></script>
</body>
</html>
